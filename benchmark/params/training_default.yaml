optimizer:
  name: Adam
  lr: 0.0002
  weight_decay: 0.0001

training:
  batch_size: 32
  epochs_matched_humidity: 40
  epochs_cross_humidity: 60
  weighted_cross_entropy: true

seeds:
  cross_humidity_repeats: [42, 52, 62, 72, 82]

evaluation:
  metrics: [accuracy, macro_precision, macro_recall, macro_f1]
